            - paragraph [ref=e29]: Il Merch di Roma Tropicale nasce come una produzione in edizione limitata, pensata per mettere al centro qualità, cura dei dettagli e una gestione responsabile delle quantità.
            - paragraph [ref=e30]: Produciamo solo ciò che serve, con l'obiettivo di ridurre gli sprechi e valorizzare ogni singolo pezzo.
            - paragraph [ref=e31]: Il progetto unisce prodotti a vocazione sostenibile, lavorazioni e personalizzazioni realizzate da fornitori locali, e la collaborazione con illustratori e illustratrici cool, che firmano le grafiche delle collezioni. Ogni pezzo è realizzato con particolare attenzione ai materiali e ai processi di produzione, per garantire qualità e durata nel tempo.
            - paragraph [ref=e32]: Le tempistiche di realizzazione variano indicativamente dai 10 giorni alle 3 settimane, in base alla disponibilità in magazzino e al carico di lavoro al momento della conferma dell'ordine.
            - paragraph [ref=e33]: Ad ogni evento sarà possibile trovare una selezione del merch, tra nuove capsule e pezzi iconici "from the archive".
            - paragraph [ref=e34]: Acquistare un prodotto del merch significa supportare attivamente l'Associazione Culturale no profit Roma Tropicale e contribuire allo sviluppo delle sue attività, diventando parte della community e ambassador del progetto.
